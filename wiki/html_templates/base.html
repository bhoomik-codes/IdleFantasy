<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} — Idle Fantasy Wiki</title>
  <link rel="stylesheet" href="assets/style.css">
  <script data-goatcounter="https://idlefantasy.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="index.html">
      <span class="site-icon">⚔️</span>
      Idle Fantasy Wiki
    </a>
    <span class="site-tagline">Community reference for all skills, combat, and crafting</span>
  </header>

  <div class="layout">
    <nav class="sidebar" aria-label="Wiki navigation">
      {{ nav }}
    </nav>

    <main class="content">
      {{ content }}
    </main>
  </div>

  <footer class="site-footer">
    <span>All data is auto-generated from game files and stays up to date with the latest release.</span>
    <span>·</span>
    <a href="https://github.com/tristinbaker/IdleFantasy/issues" target="_blank" rel="noopener">Report an issue</a>
    <span>·</span>
    <a href="https://github.com/tristinbaker/IdleFantasy" target="_blank" rel="noopener">GitHub</a>
  </footer>
</body>
</html>
